
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>R2D2 Web UI</title>

  <!--<link rel="stylesheet" href="./css/main.css">
  <link rel="stylesheet" href="./css/layout.css">
  <link rel="stylesheet" href="./css/components.css">-->

  <link rel="stylesheet" href="/static/css/main.css">
  <link rel="stylesheet" href="/static/css/layout.css">
  <link rel="stylesheet" href="/static/css/components.css">
</head>

<body>
  <main class="page-shell">
    <h1>R2D2</h1>
    
    <div class="dashboard-grid">

      <section class="panel panel-wide">
        <h2>Camera</h2>

        <div id="camera-panel">
          <div id="camera-frame">
            <img id="camera-image" alt="Camera feed" />
            <div id="camera-overlay"></div>
            <p id="camera-status">Camera feed not connected yet</p>
          </div>

          <div class="camera-controls-grid">
            <section class="camera-control-panel">
              <h3>Camera Tilt</h3>

              <div id="camera-tilt-top" class="camera-control-top">
                <div id="camera-tilt-inputs"></div>

                <div class="camera-actions">
                  <button id="camera-retry-button" type="button">Reconnect camera</button>
                </div>
              </div>

              <div class="camera-control-buttons">
                <button id="camera-setpos-button" type="button">Set Position</button>
                <button id="camera-default-button" type="button">Default</button>
                <button id="camera-low-button" type="button">Low</button>
              </div>

              <p id="camera-control-status">Camera tilt control ready</p>
            </section>

            <section class="camera-control-panel">
              <h3>Scene Understanding</h3>

              <div id="camera-vision-controls" class="camera-vision-controls"></div>

              <p id="camera-vision-status">Scene understanding overlay ready</p>
            </section>
          </div>
        </div>
      </section>

      <section class="panel">
        <h2>MPU</h2>

        <div id="mpu-panel" class="panel-box">
          <div id="mpu-grid" class="mpu-grid">
            
          </div>
        </div>
      </section>

      <section class="panel">
        <h2>Head Rotation</h2>

        <div id="head-control-panel" class="head-control-panel">
          <div class="head-visual-panel">
            <div class="head-visual-stage">
              <div class="head-angle-ring"></div>

              <div class="head-image-wrapper">
                <img
                  id="head-rotation-image"
                  src="/static/assets/img/head-top-view.png"
                  alt="Top view of robot head"
                  draggable="false"
                />
              </div>

              <div class="head-center-dot"></div>
            </div>

            <p id="head-angle-readout">Target angle: 0°</p>
          </div>

          <div class="head-command-panel">
            <div id="head-toggle-row" class="head-toggle-row"></div>
            <div id="head-input-grid" class="head-input-grid"></div>

            <div class="head-command-buttons">
              <button id="head-stop-button" type="button" class="head-command-button head-stop-button">
                Stop
              </button>
              <button id="head-send-button" type="button" class="head-command-button">
                Send Command
              </button>
            </div>

            <p id="head-command-status">Head rotation control ready</p>
          </div>
        </div>
      </section>

      <section class="panel panel-wide">
  <h2>Head Action Panel</h2>

  <div id="controls-panel" class="controls-panel">

    <section class="controls-section">
      <h3>Actions</h3>
      <div id="actions-grid" class="actions-grid"></div>
    </section>

    <section class="controls-section">
      <h3>Lids</h3>
      <div id="lids-grid" class="controls-grid"></div>
    </section>

    <section class="controls-section">
      <h3>Nobs</h3>
      <div id="nobs-grid" class="controls-grid"></div>
    </section>

  </div>
</section>
    </div>
  </main>


  <!-- Templates -->

  <template id="head-toggle-group-template">
  <div class="head-toggle-group">
    <span class="head-toggle-label">Label</span>
    <div class="head-toggle-buttons"></div>
  </div>
</template>

<template id="head-input-row-template">
  <div class="head-input-row">
    <label>Label</label>
    <input type="number" />
  </div>
</template>

  <template id="mpu-card-template">
  <article class="mpu-card">
    <h3 class="mpu-title">MPU Name</h3>

    <div class="mpu-section">
      <h4>Acceleration</h4>
      <div class="mpu-values">
        <div class="mpu-value-row">
          <span class="mpu-label">X</span>
          <span class="mpu-value" data-field="acc-x">N.a.</span>
        </div>
        <div class="mpu-value-row">
          <span class="mpu-label">Y</span>
          <span class="mpu-value" data-field="acc-y">N.a.</span>
        </div>
        <div class="mpu-value-row">
          <span class="mpu-label">Z</span>
          <span class="mpu-value" data-field="acc-z">N.a.</span>
        </div>
      </div>
    </div>

    <div class="mpu-age">
      <span class="mpu-label">Age</span>
      <span class="mpu-value" data-field="age">N.a.</span>
    </div>
  </article>
</template>

<template id="lid-card-template">
  <article class="control-card">
    <h4 class="control-title">Lid Name</h4>
    <p class="control-status">Not connected yet</p>

    <div class="control-actions">
      <button class="control-button control-open-button" type="button">Open</button>
      <button class="control-button control-close-button" type="button">Close</button>
    </div>
  </article>
</template>

<template id="nob-card-template">
  <article class="control-card">
    <h4 class="control-title">Nob Name</h4>
    <p class="control-status">Not connected yet</p>

    <div class="control-actions">
      <button class="control-button control-run-button" type="button">Run</button>
    </div>
  </article>
</template>

<template id="action-button-template">
  <article class="action-card">
    <h4 class="action-title">Action Name</h4>
    <button class="control-button action-trigger-button" type="button">Run</button>
  </article>
</template>

<template id="camera-control-row-template">
  <div class="camera-control-row">
    <label>Label</label>
    <input type="number" />
  </div>
</template>

<template id="camera-toggle-row-template">
  <div class="camera-vision-toggle-row">
    <span class="camera-vision-label">Label</span>
    <button type="button" class="camera-vision-toggle-button">Off</button>
  </div>
</template>

  <!--<script type="module" src="./js/main.js"></script>--> 
  <script type="module" src="/static/js/main.js"></script>
</body>
